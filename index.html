  <!-- Splash Screen Styles (rendered before JS/React) -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #FDFBF7;
      color: #2D2A26;
      font-family: 'Inter', sans-serif;
    }

    /* ── Splash Screen ── */
    #vseva-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #fff7ed 0%, #ffedd5 40%, #FDFBF7 100%);
      transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #vseva-splash.splash-hidden {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    /* Radial glow behind logo */
    .splash-glow {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249,115,22,0.18) 0%, transparent 70%);
      animation: glowPulse 2.4s ease-in-out infinite;
    }

    .splash-logo-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .splash-logo {
      width: 148px;
      height: 148px;
      object-fit: contain;
      animation: logoEntrance 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      filter: drop-shadow(0 8px 32px rgba(234,88,12,0.22));
    }

    .splash-brand {
      margin-top: 18px;
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c2410c, #ea580c, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeSlideUp 0.6s 0.4s ease both;
      letter-spacing: -0.5px;
    }

    .splash-tagline {
      margin-top: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9a3412;
      opacity: 0.75;
      animation: fadeSlideUp 0.6s 0.65s ease both;
    }

    /* Animated dots loader */
    .splash-dots {
      display: flex;
      gap: 6px;
      margin-top: 40px;
      animation: fadeSlideUp 0.6s 0.9s ease both;
    }
    .splash-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ea580c;
      opacity: 0.5;
      animation: dotBounce 1.2s 1s ease-in-out infinite;
    }
    .splash-dots span:nth-child(2) { animation-delay: 1.15s; }
    .splash-dots span:nth-child(3) { animation-delay: 1.3s; }

    /* Keyframes */
    @keyframes logoEntrance {
      0%   { opacity: 0; transform: scale(0.6) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes fadeSlideUp {
      0%   { opacity: 0; transform: translateY(14px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes glowPulse {
      0%, 100% { transform: scale(1);   opacity: 0.7; }
      50%       { transform: scale(1.12); opacity: 1;   }
    }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(1);   opacity: 0.4; }
      40%            { transform: scale(1.5); opacity: 1;   }
    }
  </style>

    </div>
    <div class="splash-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>

  <!-- Global splash dismiss API — called by React when ready -->
  <script>
    window.hideSplash = function() {
      var splash = document.getElementById('vseva-splash');
      if (splash) {
        splash.classList.add('splash-hidden');
        setTimeout(function() {
          if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
        }, 600);
      }
    };
  </script>
</body>
